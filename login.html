<!doctype html>
<html lang="en">

<head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

    <title>Login Form</title>
</head>

<body>


    <div class="container mt-5">
        <div class="row">
            <h1>Login Form</h1>
            <div class="card shadow">
                <div class="card-body">


                   

                    <div class="form-floating mb-3">
                        <input type="email" class=" email form-control" id="floatingInput" placeholder="name@example.com">
                        <label for="floatingInput">Email address</label>
                        <span id="emessage"></span>
                    </div>
                    <div class="form-floating mb-3">
                        <input type="password" class="password form-control" id="floatingPassword" placeholder="Password">
                        <label for="floatingPassword">Password</label>
                         <span id="pmessage"></span>
                    </div>

                    <button type="button" onclick="Login()" class="btn btn-primary">Login</button>

                </div>
            </div>
        </div>
    </div>


    <!-- Option 1: Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>



<script src="app.js"></script>
</body>

</html>
