  <body>

<header class="d-flex flex-wrap align-items-center justify-content-center justify-content-md-between py-3 mb-4 border-bottom">

      <div id="loginbtn" class="col-md-3 text-end">
        <a  href="login.html" class="btn btn-outline-primary me-2">Login</a>
        <a id="registerbtn" href="register.html" class="btn btn-outline-primary me-2">Sign-up</a>

        <!-- navbar -->




        <!-- Detail Page Section -->

        <div class="container">
          <div class="row" id="detailpage">

          </div>

        <!-- Detail Page Section -->

        
        <div class="container mt-3 shadow">
  <div class="row">
    <div class="col-12">
        <h1 class="text-center text-danger">Category Listing</h1>
    </div>
  </div>
</div>


<div class="container mt-3">
<div class="row" id="CategoryListing">

</div>
</div>


<!-- Product Section -->

<div class="container mt-3 shadow">
  <div class="row">
    <div class="col-12">
        <h1 class="text-center text-danger">Receint Products</h1>
    </div>
  </div>
</div>


<div class="container mt-3">
<div class="row" id="productListing">

</div>
</div>



<!-- Product Section -->
    <!-- Option 1: Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>



    <script>
        //Get Data FROM URl
        var url = location.href

        var obj = new URL(url)

        //Now Get Specific Data From URL
        var name = obj.searchParams.get("name");
        var desc = obj.searchParams.get("desc");
        var qty = obj.searchParams.get("qty");
        var price = obj.searchParams.get("price");
        var image = obj.searchParams.get("image");
       
        

        //Now Create Design For DetailPage
        var InStck = "";
        if(qty > 0){
          InStck = `<span class="badge bg-primary">InStock</span>`;
        }else{
          InStck = `<span class="badge bg-danger">OutOfStock</span>`;
        }


  var creatingproducts = `
   <div class="col-sm-12 col-md-6 col-lg-6 my-3">
      <div class="card" style="width: 40rem; shadow">
        <img src="images/${image}" class="card-img-top" alt="...">
      </div>
    </div>
<div class="col-sm-12 col-md-6 col-lg-6 my-3">
    <div class="card" style="width: 18rem; shadow">
      <div class="card-body">
        <h5 class="card-title">${name}</h5>
        <p class="card-text">${desc}</p>
        <p class="card-text">${price}</p>
         <p class="card-text">Stock:${InStck}</p>
        <a href="detail.html?name=${name}&desc=${desc}&qty=${qty}&price=${price}&image=${image}" class="btn btn-warning">Checkout</a>
      </div>
    </div>
   </div>`

   //Now Target detailpage id


   document.getElementById("detailpage").innerHTML = creatingproducts

        
    </script>

    <script src="app.js"></script>
    
  </body>
</html>
